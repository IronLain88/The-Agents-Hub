services:
  hub:
    build: .
    container_name: the-agents-hub
    restart: unless-stopped
    ports:
      - "4242:4242"
    volumes:
      - hub-data:/app/data
      - ./.env:/app/.env:ro  # Mount .env file (read-only)
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4242
    env_file:
      - .env  # Load all vars from .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4242/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - the-agents-network

  mcp-http:
    build:
      context: ../The-Agents-MCP
      dockerfile: Dockerfile
    container_name: the-agents-mcp-http
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MCP_HTTP_PORT=3001
      - HUB_URL=https://the-agents.net
    env_file:
      - .env
    networks:
      - the-agents-network

networks:
  the-agents-network:
    driver: bridge

volumes:
  hub-data:
