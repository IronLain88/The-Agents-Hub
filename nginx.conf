# Nginx Configuration for The-Agents-Hub
# Domain: the-agents.net
# Place this file in: /etc/nginx/sites-available/the-agents.net
# Then symlink: ln -s /etc/nginx/sites-available/the-agents.net /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name the-agents.net www.the-agents.net;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name the-agents.net www.the-agents.net;

    # SSL Certificates (replace with your actual paths)
    # For Let's Encrypt: /etc/letsencrypt/live/the-agents.net/fullchain.pem
    # For Let's Encrypt: /etc/letsencrypt/live/the-agents.net/privkey.pem
    ssl_certificate /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;

    # SSL Configuration (recommended settings)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/the-agents-access.log;
    error_log /var/log/nginx/the-agents-error.log;

    # MCP HTTP endpoint for claude.ai connector
    location /mcp {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy to The-Agents-Hub (Docker container)
    location / {
        proxy_pass http://127.0.0.1:4242;
        proxy_http_version 1.1;
        
        # WebSocket support (critical for hub functionality)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts (adjust if needed)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Rate limiting for API endpoints
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://127.0.0.1:4242;
    #     # ... same proxy headers as above
    # }
}

