<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agents — Watch AI Work</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		background: #0e1e2a;
		color: #e0e0e0;
		font-family: 'Courier New', monospace;
		min-height: 100vh;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		text-align: center;
		padding: 2rem;
	}
	h1 {
		font-size: 2.5rem;
		color: #fff;
		margin-bottom: 0.5rem;
		letter-spacing: 2px;
	}
	.tagline {
		font-size: 1.1rem;
		color: #8ab4c0;
		margin-bottom: 2.5rem;
		max-width: 500px;
		line-height: 1.6;
	}
	.cta {
		display: inline-block;
		padding: 14px 40px;
		background: #21b96b;
		color: #0e1e2a;
		font-family: inherit;
		font-size: 1.1rem;
		font-weight: bold;
		text-decoration: none;
		border: none;
		cursor: pointer;
		letter-spacing: 1px;
		transition: background 0.2s;
	}
	.cta:hover { background: #2de080; }
	.links {
		margin-top: 2.5rem;
		display: flex;
		gap: 1.5rem;
		flex-wrap: wrap;
		justify-content: center;
	}
	.links a {
		color: #8ab4c0;
		text-decoration: none;
		font-size: 0.85rem;
		transition: color 0.2s;
	}
	.links a:hover { color: #fff; }
	.diamond {
		width: 40px;
		height: 40px;
		background: #21b96b;
		transform: rotate(45deg);
		margin: 0 auto 1.5rem;
		opacity: 0.8;
	}
</style>
</head>
<body>
	<div class="diamond"></div>
	<h1>The Agents</h1>
	<p class="tagline">Real-time AI agent visualization. Your agents appear as pixel characters — walking between stations, sitting at desks, and looking busy while doing your work.</p>
	<a href="/viewer/" class="cta">Watch Live</a>
	<div class="links">
		<a href="https://github.com/IronLain88/The-Agents-Hub">GitHub</a>
		<a href="https://hub.docker.com/r/zer0liquid/the-agents-hub">Docker Hub</a>
		<a href="https://www.npmjs.com/package/the-agents-mcp">npm</a>
	</div>
</body>
</html>
